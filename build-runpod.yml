name: Build RunPod CUDA Image

on:
  push:
    branches: [master]
    paths:
      - '.devops/Dockerfile.runpod-cuda'
      - '.devops/runpod-entrypoint.sh'
      - '.github/workflows/build-runpod.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .devops
          file: .devops/Dockerfile.runpod-cuda
          push: true
          tags: ghcr.io/thisld/llama.cpp:runpod-cuda
          cache-from: type=gha
          cache-to: type=gha,mode=max
